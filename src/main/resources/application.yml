server:
  # This tells Spring to use the port Render gives it, or 8080 as a backup for your local machine
  port: ${PORT:8080}

openrouter:
  api:

    key: ${OPENROUTER_API_KEY}
    url: "https://openrouter.ai/api/v1/chat/completions"
  model: "google/gemini-2.0-flash-001" # Updated to a faster, modern model

logging:
  level:
    root: INFO
    org.example: DEBUG # Keep this as DEBUG while you are testing the live deployment
